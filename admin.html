<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fa;
            color: #333;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            letter-spacing: -0.02em;
        }

        #login-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 400px;
            margin: auto;
            text-align: center;
        }

        input[type="password"] {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        button {
            padding: 0.8rem 1.5rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #333;
        }

        #dashboard {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #fcfcfc;
            font-weight: 600;
            color: #666;
        }

        .blocked-badge {
            background: #ffe3e3;
            color: #d10000;
            padding: 4px 8px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-msg {
            color: red;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        .online-badge {
            background: #e8f5e9;
            color: #1b5e20;
            padding: 5px 12px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
        }

        .annotation-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 1rem;
            background: #fcfcfc;
            margin-bottom: 1rem;
        }

        .annotation-meta {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .annotation-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 1rem;
        }

        .annotation-preview-tile {
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fff;
            padding: 0.75rem;
        }

        .annotation-preview-surface {
            background: linear-gradient(45deg, #f7f7f7 25%, transparent 25%), linear-gradient(-45deg, #f7f7f7 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f7f7f7 75%), linear-gradient(-45deg, transparent 75%, #f7f7f7 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            border-radius: 6px;
            padding: 8px;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .annotation-preview-surface img {
            max-width: 100%;
            max-height: 140px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container" id="login-section">
        <h1>Admin Access</h1>
        <p style="color:#666; margin-bottom:1.5rem; font-size: 0.9rem;">Enter the master password to view the database.</p>
        <input type="password" id="pwd" placeholder="Enter password" onkeydown="if(event.key === 'Enter') loadData()">
        <button onclick="loadData()">Unlock Database</button>
        <div id="error-msg" class="status-msg"></div>
    </div>

    <div class="container" id="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Live Database Logs</h1>
            <button onclick="location.reload()" style="background: #efefef; color: #000;">Refresh Data</button>
        </div>

        <div style="display: flex; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 250px;">
                <h3>Currently Online</h3>
                <div id="online-list" style="display:flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;">Loading...</div>
            </div>
            <div style="flex: 1; min-width: 250px;">
                <h3>Registered Users</h3>
                <div id="users-list" style="margin-top: 10px; font-size: 0.9rem; color: #555;">Loading...</div>
            </div>
        </div>

        <hr style="border: none; border-top: 1px solid #eee; margin: 2rem 0;">

        <h3>Saved Annotations</h3>
        <div id="annotations-list" style="margin-top: 1rem;">Loading...</div>

        <hr style="border: none; border-top: 1px solid #eee; margin: 2rem 0;">

        <h3>Access History</h3>
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>C3 Username</th>
                    <th>PDF Accessed</th>
                    <th>IP Address</th>
                    <th>Action</th>
                    <th>Controls</th>
                </tr>
            </thead>
            <tbody id="logs-body">
                <!-- Data goes here -->
            </tbody>
        </table>
    </div>

    <script>
        let adminData = null;
        let dashboardRefreshTimer = null;
        const annotationPreviewCache = new Map();
        const annotationOpenState = new Set();

        function formatLastSeen(lastOnline) {
            const mins = Math.floor((Date.now() - lastOnline) / 60000);
            if (mins < 1) return 'Just now';
            if (mins > 1440) return `${Math.floor(mins / 1440)} days ago`;
            if (mins > 60) return `${Math.floor(mins / 60)} hrs ago`;
            return `${mins} min ago`;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function buildAnnotationKey(user, file) {
            return `${user}::${file}`;
        }

        function buildAnnotationVersion(annotation) {
            return annotation ? `${annotation.updatedAt || ''}|${annotation.pageCount || 0}` : '';
        }

        function getAnnotationSummary(user, file) {
            return (adminData?.annotations || []).find(annotation => annotation.user === user && annotation.file === file) || null;
        }

        function renderUsersAndPresence(data) {
            const usersList = document.getElementById('users-list');
            if (data.users && data.users.length > 0) {
                usersList.innerHTML = data.users.map(u => {
                    const seenText = formatLastSeen(u.lastOnline);
                    const isBlocked = data.blocked && (data.blocked.includes(u.ip) || data.blocked.includes(u.username));
                    const btn = isBlocked ?
                        `<button onclick='unban(${JSON.stringify(u.username)})' style="padding:4px 8px; font-size:0.75rem; background:#6c757d; border-radius:4px;">Unban</button>` :
                        `<button onclick='banUser(${JSON.stringify(u.username)})' style="padding:4px 8px; font-size:0.75rem; background:#dc3545; border-radius:4px;">Ban IP</button>`;

                    return `<div style="margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center; background:#fbfbfb; padding:8px; border-radius:6px; border:1px solid #eee;">
                        <div>
                            <strong style="color:#222;">${escapeHtml(u.username)}</strong>
                            <span style="font-size:0.75rem; color:#888;">(${escapeHtml(u.ip || 'No IP')})</span>
                            <br><span style="font-size:0.8rem; color:#555;">last seen: ${seenText}</span>
                            ${isBlocked ? '<span class="blocked-badge" style="margin-left: 5px;">BANNED</span>' : ''}
                        </div>
                        <div>
                            ${btn}
                            <button onclick='deleteUser(${JSON.stringify(u.username)})' style="padding:4px 8px; font-size:0.75rem; background:#333; border-radius:4px; margin-left:4px;">Delete User</button>
                        </div>
                    </div>`;
                }).join('');
            } else {
                usersList.innerHTML = "No users found.";
            }

            const onlineList = document.getElementById('online-list');
            if (data.users && data.users.length > 0) {
                const now = Date.now();
                const onlineUsers = data.users.filter(u => (now - u.lastOnline) < 60000);
                if (onlineUsers.length > 0) {
                    onlineList.innerHTML = onlineUsers.map(u => `<span class="online-badge"><span class="online-dot"></span>${escapeHtml(u.username)}</span>`).join('');
                } else {
                    onlineList.innerHTML = "<span style='color: #888;'>Nobody is currently active.</span>";
                }
            } else {
                onlineList.innerHTML = "<span style='color: #888;'>No registered users yet.</span>";
            }
        }

        function renderAnnotations(data) {
            const annotationsList = document.getElementById('annotations-list');
            const annotations = data.annotations || [];

            if (!annotations.length) {
                annotationsList.innerHTML = "<span style='color: #888;'>No saved annotations found.</span>";
                return;
            }

            annotationsList.innerHTML = annotations.map(annotation => {
                const annotationKey = buildAnnotationKey(annotation.user, annotation.file);
                const isOpen = annotationOpenState.has(annotationKey);
                const previewState = annotationPreviewCache.get(annotationKey);
                const lastUpdated = annotation.updatedAt ? new Date(annotation.updatedAt).toLocaleString() : 'Unknown';
                let previewMarkup = '';

                if (isOpen) {
                    if (previewState?.loading) {
                        previewMarkup = '<div style="margin-top: 1rem; color: #666;">Loading previews...</div>';
                    } else if (previewState?.error) {
                        previewMarkup = `<div style="margin-top: 1rem; color: #d10000;">${escapeHtml(previewState.error)}</div>`;
                    } else if (previewState?.pages?.length) {
                        previewMarkup = `<div class="annotation-preview-grid">${previewState.pages.map(page => `
                            <div class="annotation-preview-tile">
                                <div style="font-size: 0.78rem; font-weight: 600; margin-bottom: 0.5rem; color: #555;">Page ${page.page}</div>
                                <div class="annotation-preview-surface">
                                    <img src="${page.dataUrl}" alt="Annotation preview for page ${page.page}">
                                </div>
                            </div>
                        `).join('')}</div>`;
                    } else {
                        previewMarkup = '<div style="margin-top: 1rem; color: #888;">No saved preview pages found.</div>';
                    }
                }

                return `
                    <div class="annotation-card">
                        <div class="annotation-meta">
                            <div>
                                <div style="font-weight: 600; color: #222;">${escapeHtml(annotation.user)}</div>
                                <div style="font-size: 0.9rem; color: #555; margin-top: 0.15rem;">${escapeHtml(annotation.file)}</div>
                                <div style="font-size: 0.8rem; color: #888; margin-top: 0.35rem;">${annotation.pageCount} annotated page${annotation.pageCount === 1 ? '' : 's'} · Updated ${lastUpdated}</div>
                            </div>
                            <button onclick='toggleAnnotationPreview(${JSON.stringify(annotation.user)}, ${JSON.stringify(annotation.file)})'>${isOpen ? 'Hide previews' : 'View previews'}</button>
                        </div>
                        ${isOpen ? previewMarkup : ''}
                    </div>
                `;
            }).join('');
        }

        function renderLogs(data) {
            const tbody = document.getElementById('logs-body');
            tbody.innerHTML = '';

            if (data.database && data.database.length > 0) {
                const reversedDb = [...data.database].reverse();
                reversedDb.forEach(log => {
                    const tr = document.createElement('tr');
                    const dateObj = new Date(log.timestamp);
                    const cleanTime = dateObj.toLocaleString();

                    tr.innerHTML = `
                        <td style="color: #666; font-size: 0.85rem;">${cleanTime}</td>
                        <td style="font-weight: 600;">${escapeHtml(log.username)}</td>
                        <td>${escapeHtml(log.pdfVersion || 'N/A')}</td>
                        <td>${escapeHtml(log.ip || 'N/A')}</td>
                        <td>${escapeHtml(log.action || 'access')}</td>
                        <td><button onclick='deleteLog(${JSON.stringify(log.timestamp)}, ${JSON.stringify(log.username)})' style="padding: 4px 10px; font-size: 0.75rem; background: #dc3545;">Delete</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #888;">No access logs found yet.</td></tr>';
            }
        }

        function renderDashboard() {
            if (!adminData) return;
            renderUsersAndPresence(adminData);
            renderAnnotations(adminData);
            renderLogs(adminData);
        }

        async function loadAnnotationPreview(user, file) {
            const annotationKey = buildAnnotationKey(user, file);
            const pwd = document.getElementById('pwd').value;
            const annotationSummary = getAnnotationSummary(user, file);
            annotationPreviewCache.set(annotationKey, { loading: true, pages: [], version: buildAnnotationVersion(annotationSummary) });
            renderDashboard();

            try {
                const res = await fetch(`/api/admin/annotations?pwd=${encodeURIComponent(pwd)}&user=${encodeURIComponent(user)}&file=${encodeURIComponent(file)}`);
                if (!res.ok) {
                    throw new Error('Failed to load annotation previews');
                }

                const data = await res.json();
                annotationPreviewCache.set(annotationKey, {
                    loading: false,
                    pages: data.pages || [],
                    version: buildAnnotationVersion(getAnnotationSummary(user, file))
                });
            } catch (e) {
                annotationPreviewCache.set(annotationKey, {
                    loading: false,
                    pages: [],
                    error: 'Unable to load previews.',
                    version: buildAnnotationVersion(annotationSummary)
                });
            }

            renderDashboard();
        }

        function toggleAnnotationPreview(user, file) {
            const annotationKey = buildAnnotationKey(user, file);
            if (annotationOpenState.has(annotationKey)) {
                annotationOpenState.delete(annotationKey);
                renderDashboard();
                return;
            }

            annotationOpenState.add(annotationKey);
            const cached = annotationPreviewCache.get(annotationKey);
            if (!cached) {
                loadAnnotationPreview(user, file);
                return;
            }

            renderDashboard();
        }

        function syncAnnotationPreviewCache(data) {
            const annotationKeys = new Set();

            (data.annotations || []).forEach(annotation => {
                const annotationKey = buildAnnotationKey(annotation.user, annotation.file);
                const nextVersion = buildAnnotationVersion(annotation);
                const cached = annotationPreviewCache.get(annotationKey);
                annotationKeys.add(annotationKey);

                if (cached && cached.version && cached.version !== nextVersion) {
                    annotationPreviewCache.delete(annotationKey);
                    if (annotationOpenState.has(annotationKey)) {
                        loadAnnotationPreview(annotation.user, annotation.file);
                    }
                }
            });

            Array.from(annotationPreviewCache.keys()).forEach(annotationKey => {
                if (!annotationKeys.has(annotationKey)) {
                    annotationPreviewCache.delete(annotationKey);
                }
            });

            Array.from(annotationOpenState).forEach(annotationKey => {
                if (!annotationKeys.has(annotationKey)) {
                    annotationOpenState.delete(annotationKey);
                }
            });
        }

        async function refreshAdminSnapshot() {
            const pwd = document.getElementById('pwd').value;
            if (!pwd) return;

            const res = await fetch('/api/admin?pwd=' + encodeURIComponent(pwd));
            if (!res.ok) {
                throw new Error('Failed to refresh admin data');
            }

            adminData = await res.json();
            syncAnnotationPreviewCache(adminData);
            renderDashboard();
        }

        async function loadData() {
            const pwd = document.getElementById('pwd').value;
            if (!pwd) return;

            document.getElementById('error-msg').innerText = "Unlocking...";

            try {
                const res = await fetch('/api/admin?pwd=' + encodeURIComponent(pwd));
                if (res.status === 401) {
                    document.getElementById('error-msg').innerText = "Incorrect Password!";
                    return;
                }

                adminData = await res.json();
                syncAnnotationPreviewCache(adminData);

                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderDashboard();

                if (dashboardRefreshTimer) clearInterval(dashboardRefreshTimer);
                dashboardRefreshTimer = setInterval(() => {
                    refreshAdminSnapshot().catch(e => console.error('Dashboard refresh failed', e));
                }, 5000);

            } catch(e) {
                document.getElementById('error-msg').innerText = "Server Error. Are you running the server?";
                console.error(e);
            }
        }

        async function deleteLog(timestamp, username) {
            if (!confirm("Are you sure you want to delete this log?")) return;
            const pwd = document.getElementById('pwd').value;
            try {
                const res = await fetch(`/api/admin?pwd=${encodeURIComponent(pwd)}&timestamp=${encodeURIComponent(timestamp)}&username=${encodeURIComponent(username)}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    loadData();
                } else {
                    alert("Failed to delete the log.");
                }
            } catch(e) {
                alert("Error deleting log.");
            }
        }

        async function banUser(username) {
            if (!confirm(`Are you sure you want to IP ban ${username} forever?`)) return;
            const pwd = document.getElementById('pwd').value;
            try {
                const res = await fetch(`/api/admin/ban?pwd=${encodeURIComponent(pwd)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                if (res.ok) {
                    loadData();
                } else {
                    alert("Failed to ban the user.");
                }
            } catch(e) {
                alert("Error banning user.");
            }
        }

        async function unban(identifier) {
            if (!confirm(`Are you sure you want to unban ${identifier}?`)) return;
            const pwd = document.getElementById('pwd').value;
            try {
                const res = await fetch(`/api/admin/ban?pwd=${encodeURIComponent(pwd)}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier })
                });
                if (res.ok) {
                    loadData();
                } else {
                    alert("Failed to unban.");
                }
            } catch(e) {
                alert("Error unbanning.");
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Are you sure you want to PERMANENTLY delete user "${username}"?\n\nThey will be removed from the system completely.`)) return;
            const pwd = document.getElementById('pwd').value;
            try {
                const res = await fetch(`/api/admin/user?pwd=${encodeURIComponent(pwd)}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                if (res.ok) {
                    loadData();
                } else {
                    alert("Failed to delete user.");
                }
            } catch(e) {
                alert("Error deleting user.");
            }
        }
    </script>
</body>
</html>
