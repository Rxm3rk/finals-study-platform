<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fa;
            color: #333;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            letter-spacing: -0.02em;
        }

        #login-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 400px;
            margin: auto;
            text-align: center;
        }

        input[type="password"] {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        button {
            padding: 0.8rem 1.5rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #333;
        }

        #dashboard {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #fcfcfc;
            font-weight: 600;
            color: #666;
        }

        .blocked-badge {
            background: #ffe3e3;
            color: #d10000;
            padding: 4px 8px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-msg {
            color: red;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        .online-badge {
            background: #e8f5e9;
            color: #1b5e20;
            padding: 5px 12px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container" id="login-section">
        <h1>Admin Access</h1>
        <p style="color:#666; margin-bottom:1.5rem; font-size: 0.9rem;">Enter the master password to view the database.</p>
        <input type="password" id="pwd" placeholder="Enter password" onkeydown="if(event.key === 'Enter') loadData()">
        <button onclick="loadData()">Unlock Database</button>
        <div id="error-msg" class="status-msg"></div>
    </div>

    <div class="container" id="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Live Database Logs</h1>
            <button onclick="location.reload()" style="background: #efefef; color: #000;">Refresh Data</button>
        </div>

        <div style="display: flex; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 250px;">
                <h3>Currently Online</h3>
                <div id="online-list" style="display:flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;">Loading...</div>
            </div>
            <div style="flex: 1; min-width: 250px;">
                <h3>Registered Users</h3>
                <div id="users-list" style="margin-top: 10px; font-size: 0.9rem; color: #555;">Loading...</div>
            </div>
        </div>

        <hr style="border: none; border-top: 1px solid #eee; margin: 2rem 0;">

        <h3>Access History</h3>
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>C3 Username</th>
                    <th>PDF Accessed</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="logs-body">
                <!-- Data goes here -->
            </tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            const pwd = document.getElementById('pwd').value;
            if (!pwd) return;

            document.getElementById('error-msg').innerText = "Unlocking...";

            try {
                const res = await fetch('/api/admin?pwd=' + encodeURIComponent(pwd));
                if (res.status === 401) {
                    document.getElementById('error-msg').innerText = "Incorrect Password!";
                    return;
                }

                const data = await res.json();
                
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

                // Render Registered Users and Offline Tracker
                const usersList = document.getElementById('users-list');
                if (data.users && data.users.length > 0) {
                    usersList.innerHTML = data.users.map(u => {
                        const mins = Math.floor((Date.now() - u.lastOnline) / 60000);
                        let seenText = `${mins} min ago`;
                        if (mins < 1) seenText = 'Just now';
                        else if (mins > 1440) seenText = `${Math.floor(mins / 1440)} days ago`;
                        else if (mins > 60) seenText = `${Math.floor(mins / 60)} hrs ago`;
                        
                        const isBlocked = data.blocked && (data.blocked.includes(u.ip) || data.blocked.includes(u.username));
                        const btn = isBlocked ? 
                            `<button onclick="unban('${u.username}')" style="padding:4px 8px; font-size:0.75rem; background:#6c757d; border-radius:4px;">Unban</button>` :
                            `<button onclick="banUser('${u.username}')" style="padding:4px 8px; font-size:0.75rem; background:#dc3545; border-radius:4px;">Ban IP</button>`;

                        return `<div style="margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center; background:#fbfbfb; padding:8px; border-radius:6px; border:1px solid #eee;">
                            <div>
                                <strong style="color:#222;">${u.username}</strong>
                                <span style="font-size:0.75rem; color:#888;">(${u.ip || 'No IP'})</span>
                                <br><span style="font-size:0.8rem; color:#555;">last seen: ${seenText}</span>
                                ${isBlocked ? '<span class="blocked-badge" style="margin-left: 5px;">BANNED</span>' : ''}
                            </div>
                            ${btn}
                        </div>`;
                    }).join('');
                } else {
                    usersList.innerHTML = "No users found.";
                }

                // Render Live Online Users Matrix (60 seconds buffer)
                const onlineList = document.getElementById('online-list');
                if (data.users && data.users.length > 0) {
                    const now = Date.now();
                    const onlineUsers = data.users.filter(u => (now - u.lastOnline) < 60000);
                    if (onlineUsers.length > 0) {
                        onlineList.innerHTML = onlineUsers.map(u => `<span class="online-badge"><span class="online-dot"></span>${u.username}</span>`).join('');
                    } else {
                        onlineList.innerHTML = "<span style='color: #888;'>Nobody is currently active.</span>";
                    }
                } else {
                    onlineList.innerHTML = "<span style='color: #888;'>No registered users yet.</span>";
                }

                // Render DB Logs
                const tbody = document.getElementById('logs-body');
                tbody.innerHTML = '';
                
                if (data.database && data.database.length > 0) {
                    // Reverse to show newest first
                    const reversedDb = [...data.database].reverse();
                    reversedDb.forEach(log => {
                        const tr = document.createElement('tr');
                        const dateObj = new Date(log.timestamp);
                        const cleanTime = dateObj.toLocaleString();

                        tr.innerHTML = `
                            <td style="color: #666; font-size: 0.85rem;">${cleanTime}</td>
                            <td style="font-weight: 600;">${log.username}</td>
                            <td>${log.pdfVersion}</td>
                            <td><button onclick="deleteLog('${log.timestamp}', '${log.username}')" style="padding: 4px 10px; font-size: 0.75rem; background: #dc3545;">Delete</button></td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #888;">No access logs found yet.</td></tr>';
                }

            } catch(e) {
                document.getElementById('error-msg').innerText = "Server Error. Are you running the server?";
                console.error(e);
            }
        }

        async function deleteLog(timestamp, username) {
            if (!confirm("Are you sure you want to delete this log?")) return;
            const pwd = document.getElementById('pwd').value;
            try {
                const res = await fetch(`/api/admin?pwd=${encodeURIComponent(pwd)}&timestamp=${encodeURIComponent(timestamp)}&username=${encodeURIComponent(username)}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    loadData(); // Refresh UI
                } else {
                    alert("Failed to delete the log.");
                }
            } catch(e) {
                alert("Error deleting log.");
            }
        }

        async function banUser(username) {
            if (!confirm(`Are you sure you want to IP ban ${username} forever?`)) return;
            const pwd = document.getElementById('pwd').value;
            try {
                const res = await fetch(`/api/admin/ban?pwd=${encodeURIComponent(pwd)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                if (res.ok) {
                    loadData();
                } else {
                    alert("Failed to ban the user.");
                }
            } catch(e) {
                alert("Error banning user.");
            }
        }

        async function unban(identifier) {
            if (!confirm(`Are you sure you want to unban ${identifier}?`)) return;
            const pwd = document.getElementById('pwd').value;
            try {
                const res = await fetch(`/api/admin/ban?pwd=${encodeURIComponent(pwd)}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier })
                });
                if (res.ok) {
                    loadData();
                } else {
                    alert("Failed to unban.");
                }
            } catch(e) {
                alert("Error unbanning.");
            }
        }
    </script>
</body>
</html>
