<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Document Viewer</title>
    <!-- Use PDF.js from unpkg/cdnjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            height: 100%;
            overflow: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            user-select: none; /* Prevent text selection */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* Prevent printing using css */
        @media print {
            body { display: none !important; }
        }

        #pdf-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
        }

        .page-container {
            position: relative;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        canvas {
            display: block;
        }

        /* Obscurant overlay over the canvas */
        .page-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            touch-action: none; /* Helpful for touch drawing */
        }

        /* Top header for navigation / info */
        #toolbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: #2b2b2b;
            color: #ccc;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
            user-select: none;
        }

        #toolbar span {
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .toolbar-btn {
            background: #444; border: none; color: #fff; padding: 6px 16px; border-radius: 4px; cursor: pointer;
            font-size: 14px; transition: background 0.2s;
        }
        .toolbar-btn.active {
            background: #007bff;
            color: white;
            font-weight: bold;
        }

        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: 500;
            color: #555;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="toolbar">
        <span>Confidential Material</span>
        <button id="drawToggle" class="toolbar-btn">Enable Draw Mode</button>
    </div>

    <div id="loader">Loading secure document...</div>
    <div id="pdf-container" style="margin-top: 50px;"></div>

    <script>
        // Disable printing via Ctrl+P
        document.addEventListener('keydown', function(event) {
            if ((event.ctrlKey || event.metaKey) && event.key === 'p') {
                event.cancelBubble = true;
                event.preventDefault();
                event.stopImmediatePropagation();
                return false;
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        const user = urlParams.get('user');

        let isDrawMode = false;
        const drawToggle = document.getElementById('drawToggle');

        drawToggle.addEventListener('click', () => {
            isDrawMode = !isDrawMode;
            if (isDrawMode) {
                drawToggle.classList.add('active');
                drawToggle.innerText = 'Draw Mode: ON';
                // Prevent touch scrolling globally when draw mode is on
                document.body.style.overflow = 'hidden'; 
            } else {
                drawToggle.classList.remove('active');
                drawToggle.innerText = 'Enable Draw Mode';
                document.body.style.overflow = 'auto';
            }
        });

        if (!fileName || !user) {
            document.getElementById('loader').innerText = "Error: Invalid document URL or missing user authentication.";
        } else {
            const pdfUrl = '/api/document?file=' + encodeURIComponent(fileName) + '&user=' + encodeURIComponent(user);

            // Configure PDF.js worker
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            // Loading the PDF.
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            loadingTask.promise.then(function(pdf) {
                document.getElementById('loader').style.display = 'none';
                
                // Fetch and render all pages
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    renderPage(pdf, pageNum);
                }
            }, function (reason) {
                console.error(reason);
                if (reason.message && reason.message.includes('403')) {
                    document.getElementById('loader').innerText = "Access Denied: Your account has been blocked.";
                } else {
                    document.getElementById('loader').innerText = "Failed to load secure document. Access Denied.";
                }
            });
            
            function renderPage(pdf, pageNum) {
                pdf.getPage(pageNum).then(function(page) {
                    const scale = 1.5;
                    const viewport = page.getViewport({scale: scale});

                    // Prepare outer container
                    const container = document.createElement('div');
                    container.className = 'page-container';
                    container.style.width = viewport.width + "px";
                    container.style.height = viewport.height + "px";
                    
                    // Create canvas layer
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    // Create transparent drawing overlay
                    const overlay = document.createElement('canvas');
                    overlay.className = 'page-overlay';
                    overlay.width = viewport.width;
                    overlay.height = viewport.height;
                    const overlayCtx = overlay.getContext('2d');
                    overlayCtx.lineCap = 'round';
                    overlayCtx.lineJoin = 'round';
                    overlayCtx.lineWidth = 3;
                    overlayCtx.strokeStyle = 'rgba(255, 0, 0, 0.7)'; // Red highlighter

                    // Load saved drawing if any
                    const storageKey = `annotation_${user}_${fileName}_p${pageNum}`;
                    const savedData = localStorage.getItem(storageKey);
                    if (savedData) {
                        const img = new Image();
                        img.onload = () => { overlayCtx.drawImage(img, 0, 0); };
                        img.src = savedData;
                    }

                    // Drawing logic
                    let isDrawing = false;
                    let lastX = 0;
                    let lastY = 0;

                    function startDraw(e) {
                        if (!isDrawMode) return;
                        e.preventDefault();
                        isDrawing = true;
                        const rect = overlay.getBoundingClientRect();
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        lastX = clientX - rect.left;
                        lastY = clientY - rect.top;
                    }

                    function draw(e) {
                        if (!isDrawing || !isDrawMode) return;
                        e.preventDefault();
                        const rect = overlay.getBoundingClientRect();
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        const currentX = clientX - rect.left;
                        const currentY = clientY - rect.top;

                        overlayCtx.beginPath();
                        overlayCtx.moveTo(lastX, lastY);
                        overlayCtx.lineTo(currentX, currentY);
                        overlayCtx.stroke();
                        
                        lastX = currentX;
                        lastY = currentY;
                    }

                    function endDraw() {
                        if (!isDrawing) return;
                        isDrawing = false;
                        // Save to local storage
                        localStorage.setItem(storageKey, overlay.toDataURL());
                    }

                    overlay.addEventListener('mousedown', startDraw);
                    overlay.addEventListener('mousemove', draw);
                    window.addEventListener('mouseup', endDraw);

                    overlay.addEventListener('touchstart', startDraw, {passive: false});
                    overlay.addEventListener('touchmove', draw, {passive: false});
                    window.addEventListener('touchend', endDraw);

                    container.appendChild(canvas);
                    container.appendChild(overlay);
                    document.getElementById('pdf-container').appendChild(container);

                    // Render PDF page into canvas context
                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    page.render(renderContext);
                });
            }
        }
    </script>
</body>
</html>
